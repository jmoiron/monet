<div class="stream-card github-detail github-pr-detail">
    <div class="stream-card-header">
        <div class="stream-card-avatar">
            {{if .avatar_url}}
            <a href="{{.profile_url}}" target="_blank">
                <span class="stream-card-avatar-circle"><img src="{{.avatar_url}}" alt=""></span>
            </a>
            {{end}}
        </div>
        <div class="stream-card-identity">
            <div class="stream-card-repo-line">
                <i class="fa-brands fa-github"></i>
                <a href="{{.repo_url}}" target="_blank">{{.repo_name}}</a>
                <span class="stream-card-separator">&middot;</span>
                <span class="stream-card-pr">
                    <a href="{{.url}}" target="_blank" class="stream-card-pr-link">{{if eq .action "merged"}}<i class="fa-solid fa-code-merge"></i> {{else if eq .action "opened"}}<i class="fa-solid fa-code-pull-request"></i> {{else if eq .action "closed"}}<i class="fa-solid fa-circle-xmark"></i> {{end}}PR #{{.pr_number}}</a>
                </span>
                {{if and .head_ref .base_ref}}
                <span class="stream-card-separator">&middot;</span>
                <span class="stream-card-pr-branches">{{.head_ref}} → {{.base_ref}}</span>
                {{end}}
            </div>
            <div class="stream-card-handle"><a href="{{.profile_url}}" target="_blank">{{.handle}}</a></div>
        </div>
    </div>
    <div class="stream-card-body">
        <div class="stream-card-pr-title">{{.pr_title}}</div>
        <div class="stream-card-pr-body">{{.pr_body_md | safe}}</div>
    </div>
    <div class="stream-card-timestamp">{{.timestamp_ui}}</div>
</div>
