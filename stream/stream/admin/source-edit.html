<div class="title"><h1>{{.source.Name}}</h1></div>

<p>{{.module.Description}}</p>

<form action="/admin/stream/source/{{.source.Kind}}" method="POST">
  <p>
    <label>Name</label><br>
    <input type="text" name="name" value="{{.source.Name}}">
  </p>

  <p>
    <label>
      <input type="checkbox" name="enabled" {{if .source.Enabled}}checked{{end}}>
      Enabled
    </label>
  </p>

  <p>
    <label>Schedule Minutes</label><br>
    <input type="number" min="0" name="schedule_minutes" value="{{.source.ScheduleMinutes}}">
    <br><small>Set to 0 for manual-only runs.</small>
  </p>

  {{range .fields}}
  <p>
    <label>{{.Label}}</label><br>
    {{if eq .Type "password"}}
      <input type="password" name="{{.Name}}" value="{{index $.settings .Name}}" placeholder="{{.Placeholder}}">
    {{else if eq .Type "checkbox"}}
      <label><input type="checkbox" name="{{.Name}}" {{if eq (index $.settings .Name) "true"}}checked{{end}}> {{.Help}}</label>
    {{else}}
      <input type="text" name="{{.Name}}" value="{{index $.settings .Name}}" placeholder="{{.Placeholder}}">
    {{end}}
    {{if and (ne .Type "checkbox") .Help}}<br><small>{{.Help}}</small>{{end}}
  </p>
  {{end}}

  <p>
    <button type="submit">Save</button>
  </p>
</form>

<div class="button-group">
  <a href="/admin/stream/run/{{.source.Kind}}" class="icon-action js-post-link{{if .running}} disabled{{end}}" title="Refresh this source once using its normal incremental import settings." aria-disabled="{{if .running}}true{{else}}false{{end}}"><i class="fa-solid fa-arrow-down-wide-short"></i></a>

  <a href="/admin/stream/run/{{.source.Kind}}/full" class="icon-action js-post-link{{if .running}} disabled{{end}}" title="Run a deeper full import for this source, using its full backfill settings." aria-disabled="{{if .running}}true{{else}}false{{end}}"><i class="fa-solid fa-arrows-spin"></i></a>

  <a href="/admin/stream/run/{{.source.Kind}}/rerender" class="icon-action js-post-link{{if .running}} disabled{{end}}" title="Rebuild the rendered HTML for existing entries from this source without fetching new upstream data." aria-disabled="{{if .running}}true{{else}}false{{end}}"><i class="fa-solid fa-rotate-right"></i></a>
</div>
