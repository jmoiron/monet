<article class="stream-detail">
    {{if .show_meta}}
    <div class="stream-meta">
        <span class="stream-type">{{.event.Type}}</span>
        <span class="date">{{.event.Timestamp | naturalTime}}</span>
    </div>
    {{end}}

    <div class="stream-detail-rendered">
        {{.detail_rendered | safe}}
    </div>

    {{if .raw_event}}
    <details class="stream-raw">
        <summary>Raw event</summary>
        <pre><tt>{{.raw_event}}</tt></pre>
    </details>
    {{end}}
</article>
