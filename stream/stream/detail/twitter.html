<div class="stream-card twitter-detail">
    <div class="stream-card-header">
        <div class="stream-card-icon">
            <span class="stream-card-icon-circle"><i class="fa-brands fa-twitter"></i></span>
        </div>
        <div class="stream-card-identity">
            <div class="stream-card-name">{{.display_name}}</div>
            <div class="stream-card-handle">{{.handle}}</div>
        </div>
        <div class="stream-card-timestamp">{{.timestamp_ui}}</div>
    </div>
    <div class="stream-card-body">{{.text}}</div>
</div>
