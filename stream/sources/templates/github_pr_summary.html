<div class="entry github">
  <a href="{{.url}}"><i class="fa-brands fa-github"></i></a>
  <span class="name"><a href="{{.repo_url}}">{{.repo}}</a></span>
  <span class="message">
    <span aria-hidden="true">·</span>
    <span class="stream-entry-pr">
      {{if .icon_class}}<i class="{{.icon_class}}"></i> {{end}}<a href="{{.pr_url}}">{{.pr_text}}</a>
    </span>
    {{if .branch_text}}
    <span aria-hidden="true">·</span>
    {{.branch_text}}
    {{end}}
  </span>
</div>
